name: My First Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Say Hello
        run: echo "Hello! Code was pushed to main!"
      
      - name: Show files
        run: ls -la
      
      - name: Done
        run: echo "Workflow completed successfully!"
